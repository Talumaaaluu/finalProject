<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Food Voting</title>
    <style>
        :root {
            --primary: #4834d4;
            --dark: #130f40;
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f0932b, #ffbe76);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--white);
            padding: 32px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
        }
        h1 { color: var(--primary); margin-bottom: 8px; }
        p { color: #666; margin-bottom: 24px; }
        .form-grid { display: grid; gap: 14px; }
        input, .btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
        }
        .btn {
            border: none;
            cursor: pointer;
            font-weight: bold;
            background: var(--primary);
            color: white;
        }
        .alert-error {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            background: #ffe3e3;
            color: #c0392b;
        }
        .footer-link {
            margin-top: 20px;
            text-align: center;
            color: #666;
        }
        .footer-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="card">
    <h1>Create Account</h1>
    <p>Sign up to add, edit, and vote on food entries.</p>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <form th:action="@{/register}" method="post" th:object="${registerForm}" class="form-grid">
        <input type="text" th:field="*{username}" placeholder="Username" required autofocus>
        <input type="email" th:field="*{email}" placeholder="Email" required>
        <input type="password" th:field="*{password}" placeholder="Password" required minlength="6">
        <button type="submit" class="btn">Sign Up</button>
    </form>

    <div class="footer-link">
        Already have an account? <a th:href="@{/login}">Log in</a>
    </div>
</div>
</body>
</html>
